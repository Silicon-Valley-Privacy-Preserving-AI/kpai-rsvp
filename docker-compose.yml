services:
  be:
    container_name: kpai-be
    build: ./be
    restart: unless-stopped
    volumes:
      - ./be/data:/app/data
    env_file:
      - ./be/.env
    networks:
      - kpai-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/healthcheck')",
        ]
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 300s
    # BE port is intentionally not exposed externally.
    # FE nginx proxies /api/ → http://be:8000 over the internal kpai-network.

  fe:
    container_name: kpai-fe
    build: ./fe
    restart: always
    env_file:
      - ./fe/.env
    ports:
      - "3001:80"
    depends_on:
      be:
        condition: service_started
    networks:
      - kpai-network

  mailhog:
    container_name: kpai-mailhog
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI — http://localhost:8025
      - "1025:1025"   # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    networks:
      - kpai-network

networks:
  kpai-network:
    driver: bridge