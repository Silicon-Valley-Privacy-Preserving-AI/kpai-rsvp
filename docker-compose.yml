services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    container_name: kpai-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       svain
      POSTGRES_USER:     svain
      POSTGRES_PASSWORD: svainpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kpai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svain -d svain"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI backend ───────────────────────────────────────────────────────
  be:
    container_name: kpai-be
    build: ./be
    restart: unless-stopped
    env_file:
      - ./be/.env
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - kpai-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/healthcheck')",
        ]
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 300s
    # BE port is intentionally not exposed externally.
    # FE nginx proxies /api/ → http://be:8000 over the internal kpai-network.

  # ── React / Nginx frontend ────────────────────────────────────────────────
  fe:
    container_name: kpai-fe
    build: ./fe
    restart: always
    env_file:
      - ./fe/.env
    ports:
      - "3001:80"
    depends_on:
      be:
        condition: service_started
    networks:
      - kpai-network

  # ── Mailpit (dev SMTP) ────────────────────────────────────────────────────
  mailpit:
    container_name: kpai-mailpit
    image: axllent/mailpit
    restart: unless-stopped
    # Ports are intentionally not exposed externally.
    # FE nginx proxies /mails/ → http://mailpit:8025/mails/ over the internal kpai-network.
    # BE connects to SMTP at mailpit:1025 over the internal kpai-network.
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
      MP_WEBROOT: "/mails"
    networks:
      - kpai-network

networks:
  kpai-network:
    driver: bridge

volumes:
  postgres_data:   # persists DB data across container restarts
