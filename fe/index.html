<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon & app icons ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- ── Theme color (supports light/dark OS preference) ─────────────────── -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#09090B" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F5F7" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────────── -->
    <title>SVAIN — Silicon Valley AI Nexus | AI Seminars</title>
    <meta name="description"
          content="SVAIN connects AI researchers and practitioners in Silicon Valley building the next generation of AI systems. Join seminars, build connections, and advance the field." />
    <meta name="keywords"
          content="privacy-preserving AI, AI seminars, Silicon Valley AI, SVAIN, Silicon Valley AI Nexus, differential privacy, federated learning, secure computation, AI research, machine learning, AI forum" />
    <meta name="author" content="SVAIN — Silicon Valley AI Nexus" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rsvp.k-pai.org/" />

    <!-- ── Open Graph ────────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="SVAIN — Silicon Valley AI Nexus" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:url"         content="https://rsvp.k-pai.org/" />
    <meta property="og:title"       content="SVAIN — Silicon Valley AI Nexus" />
    <meta property="og:description"
          content="Where Privacy Meets Intelligence. SVAIN connects researchers and practitioners building the next generation of privacy-preserving AI systems." />
    <meta property="og:image"       content="https://rsvp.k-pai.org/og-image.png" />
    <meta property="og:image:alt"   content="SVAIN — Silicon Valley AI Nexus. Where Privacy Meets Intelligence." />
    <meta property="og:image:width"  content="800" />
    <meta property="og:image:height" content="400" />
    <meta property="og:image:type"   content="image/png" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@kpai_ai" />
    <meta name="twitter:title"       content="SVAIN — Silicon Valley AI Nexus" />
    <meta name="twitter:description"
          content="Where Privacy Meets Intelligence. Join SVAIN seminars on privacy-preserving AI in Silicon Valley." />
    <meta name="twitter:image"       content="https://rsvp.k-pai.org/og-image.png" />
    <meta name="twitter:image:alt"   content="SVAIN — Silicon Valley AI Nexus" />

    <!-- ── PWA / mobile ─────────────────────────────────────────────────────── -->
    <meta name="application-name"                content="SVAIN" />
    <meta name="apple-mobile-web-app-title"       content="SVAIN" />
    <meta name="apple-mobile-web-app-capable"     content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable"           content="yes" />

    <!-- ── Structured data (JSON-LD) ────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SVAIN — Silicon Valley AI Nexus",
      "alternateName": "SVAIN",
      "url": "https://rsvp.k-pai.org",
      "logo": "https://rsvp.k-pai.org/logo.png",
      "description": "SVAIN connects researchers and practitioners building privacy-preserving AI systems. We host seminars, workshops, and networking events in Silicon Valley.",
      "foundingLocation": {
        "@type": "Place",
        "name": "Silicon Valley, California, USA"
      },
      "sameAs": []
    }
    </script>

    <!-- ── Fonts ─────────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- ── Critical inline styles (prevents FOUC before JS loads) ───────────── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        background: #09090B;
        color: #F4F4F5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }
      /* Light mode override for initial paint — JS theme takes over after hydration */
      [data-theme="light"] body {
        background: #F5F5F7;
        color: #111113;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
