name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            cd ~/Desktop/kpai-rsvp
            echo "🔄 Pull latest source..."
            git pull --rebase
            echo "🐳 Build & restart container..."
            docker compose down
            docker compose up -d --build
            echo "✅ Deploy completed!"
